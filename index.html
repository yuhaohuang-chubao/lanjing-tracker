<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加分任務 · 蘭境挑戰追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Direction A: Botanical Fresh */
    --moss: #3D9970;          /* 主色 草本綠 */
    --moss-deep: #2D7A55;     /* 加深綠（標題/文字） */
    --moss-light: #6BAA8A;    /* 淺綠（次要） */
    --bone: #FAFAF7;          /* 主背景 米白 */
    --bone-warm: #F2F4EF;     /* 第二層背景 微綠米白 */
    --clay: #FF6B47;          /* 強調 珊瑚橘 */
    --clay-soft: #FFA98F;     /* 淺珊瑚 */
    --ink: #2D3436;           /* 主文字 深炭 */
    --gold: #FF8A6A;          /* 警示/分數重點，與 clay 系列搭配 */
    --mist: #E8EDE9;           /* 分隔線/淺灰綠 */
    --leaf: #3D9970;           /* 對齊主色綠 */
    --soft: #95A5A6;           /* 次要文字灰 */
    --warm-bg: #FFF4E6;        /* 達標卡片背景 淡杏 */
    --shadow: rgba(45, 122, 85, 0.08);
    --shadow-strong: rgba(45, 52, 54, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bone);
    color: var(--ink);
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(61, 153, 112, 0.10), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(255, 107, 71, 0.06), transparent 55%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* Grain texture removed for clean modern look */
  body::before { display: none; }

  .wrap { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; padding: 0 18px 80px; }

  /* HEADER */
  header {
    padding: 28px 0 18px;
    border-bottom: 1px solid var(--mist);
    margin-bottom: 20px;
    position: relative;
  }

  .brand-mark {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--clay);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.02em;
    color: var(--moss-deep);
    line-height: 1.15;
  }

  h1 .accent {
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    color: var(--clay);
    font-size: 26px;
    letter-spacing: -0.01em;
  }

  .meta {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: var(--soft);
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  /* USER PICKER */
  .user-bar {
    background: var(--moss-deep);
    color: #fff;
    padding: 16px 18px;
    border-radius: 6px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .user-bar label {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 600;
  }

  .user-bar select, .user-bar input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    color: #fff;
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 500;
    font-size: 16px;
    padding: 4px 6px;
    outline: none;
    min-width: 100px;
  }

  .user-bar select option { background: var(--moss-deep); }

  .user-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--clay-soft);
    letter-spacing: -0.02em;
    text-align: right;
  }
  .user-score small {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255, 255, 255, 0.6);
    display: block;
    margin-bottom: 0;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* TEAM BOARD */
  .team-board {
    background: #fff;
    border: 1px solid var(--mist);
    padding: 20px;
    margin-bottom: 28px;
    position: relative;
    border-radius: 6px;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .team-board::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--moss), var(--clay));
    border-radius: 6px 6px 0 0;
  }

  .team-board h2 {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--moss-deep);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .team-board h2::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--clay);
    border-radius: 50%;
  }
  .team-total {
    margin-left: auto;
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-weight: normal;
    letter-spacing: 0.02em;
  }
  .team-total .label {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    color: var(--soft);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .team-total .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 600;
    color: var(--clay);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .team-total .unit {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    color: var(--soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
    gap: 10px;
  }

  .team-cell {
    background: var(--bone-warm);
    padding: 12px 8px;
    text-align: center;
    border-radius: 6px;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid transparent;
  }
  .team-cell:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--shadow);
  }
  .team-cell.self {
    background: linear-gradient(180deg, #FFF4E6 0%, #FFE8D9 100%);
    border-color: var(--clay-soft);
  }
  .team-cell .name {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: var(--moss-deep);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .team-cell .score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--moss-deep);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .team-cell.self .score {
    color: var(--clay);
  }
  .team-cell .score-label {
    font-family: 'Manrope', sans-serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--soft);
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }

  /* CATEGORY */
  .category {
    margin-bottom: 36px;
  }

  .category-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--moss-light);
  }
  .category-head .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--clay);
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.05em;
    background: #FFE8D9;
    padding: 5px 9px;
    border-radius: 4px;
  }
  .category-head .title {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 19px;
    color: var(--moss-deep);
    letter-spacing: -0.01em;
  }
  .category-head .en {
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    font-size: 11px;
    color: var(--soft);
    margin-left: auto;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* TASK CARD */
  .task {
    background: #fff;
    margin-bottom: 12px;
    border-radius: 6px;
    box-shadow: 0 1px 3px var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    border: 1px solid var(--mist);
  }
  .task:hover {
    box-shadow: 0 4px 16px var(--shadow);
  }

  .task-head {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
    background: #fff;
    border-left: 3px solid var(--moss);
  }

  .task-name {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--moss-deep);
    flex: 1;
    letter-spacing: -0.005em;
  }
  .task-name .diff {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 10px;
    color: var(--clay);
    margin-left: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: #FFE8D9;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .task-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--moss-deep);
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: -0.02em;
  }
  .task-progress small {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-size: 11px;
    color: var(--soft);
    margin-left: 2px;
    font-weight: 500;
  }

  .toggle-icon {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    color: var(--clay);
    transition: transform 0.3s, background 0.2s;
    width: 32px;
    height: 32px;
    text-align: center;
    line-height: 30px;
    border-radius: 50%;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .toggle-icon:hover { background: rgba(184, 101, 74, 0.12); }
  .toggle-icon:active { background: rgba(184, 101, 74, 0.22); }
  .task.open .toggle-icon { transform: rotate(45deg); }

  .task-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .task.open .task-body { max-height: 4000px; }

  .task-inner {
    padding: 4px 16px 18px;
    border-top: 1px solid var(--mist);
  }

  .task-desc {
    font-size: 13px;
    color: var(--ink);
    margin: 10px 0 14px;
    padding: 12px 14px;
    background: var(--bone-warm);
    border-radius: 6px;
    line-height: 1.7;
  }

  .task-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: var(--clay);
    text-decoration: none;
    margin-top: 8px;
    letter-spacing: 0.02em;
    padding: 6px 10px;
    background: #FFE8D9;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .task-link:hover { background: #FFD4B8; color: var(--moss-deep); }

  /* CHECKLIST */
  .checklist { margin-top: 10px; }
  .check-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 6px;
    border-bottom: 1px solid var(--mist);
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .check-row:hover { background: var(--bone-warm); }
  .check-row:last-child { border-bottom: none; }

  .check-box {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--soft);
    background: #fff;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    border-radius: 5px;
  }
  .check-row.done .check-box {
    background: var(--moss);
    border-color: var(--moss);
  }
  .check-box::after {
    content: '✓';
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .check-row.done .check-box::after { opacity: 1; }

  .check-label {
    flex: 1;
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }
  .check-row.done .check-label,
  .check-row.done .check-label .sub {
    color: var(--moss-light);
    text-decoration: line-through;
    text-decoration-color: var(--moss-light);
    opacity: 0.7;
  }
  .check-row.done .check-points {
    opacity: 0.5;
    text-decoration: line-through;
  }
  .check-label .sub {
    display: block;
    font-size: 11px;
    color: var(--soft);
    margin-top: 3px;
    font-weight: 400;
  }
  .check-points {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--clay);
    white-space: nowrap;
    background: #FFE8D9;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: -0.02em;
  }

  /* TIER LIST */
  .tier-list { margin-top: 8px; }
  .tier-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    margin-bottom: 6px;
    background: var(--bone-warm);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tier-row:hover {
    background: #E8EDE9;
  }
  .tier-row.done {
    background: linear-gradient(90deg, rgba(61, 153, 112, 0.10), rgba(61, 153, 112, 0.03));
    border-left: 3px solid var(--moss);
    padding-left: 11px;
  }
  .tier-row.done .check-box {
    background: var(--moss);
    border-color: var(--moss);
  }
  .tier-row.done .check-box::after { opacity: 1; }
  .tier-row.done .tier-name,
  .tier-row.done .tier-desc {
    text-decoration: line-through;
    text-decoration-color: var(--soft);
    opacity: 0.7;
  }
  .tier-row .tier-name {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    color: var(--moss-deep);
    font-size: 13px;
    min-width: 56px;
    letter-spacing: 0.02em;
  }
  .tier-row.done .tier-name { color: var(--moss-deep); }
  .tier-row .tier-desc {
    flex: 1;
    font-size: 12px;
    color: var(--soft);
    line-height: 1.5;
    font-weight: 500;
  }
  .tier-row .check-box {
    width: 20px;
    height: 20px;
  }
  .tier-row .check-points {
    font-size: 13px;
  }

  /* COUNTER */
  .counter-block {
    background: linear-gradient(135deg, #FFF4E6 0%, #FFE8D9 100%);
    padding: 14px 16px;
    margin: 12px 0;
    border-radius: 6px;
  }
  .counter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .counter-row:last-child { margin-bottom: 0; }
  .counter-label {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--moss-deep);
    font-weight: 600;
  }
  .counter-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .counter-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: #fff;
    color: var(--clay);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(255, 107, 71, 0.20);
    transition: all 0.15s;
  }
  .counter-btn:hover {
    background: var(--clay);
    color: #fff;
    transform: scale(1.05);
  }
  .counter-btn:active { transform: scale(0.95); }
  .counter-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--clay);
    min-width: 36px;
    text-align: center;
    letter-spacing: -0.02em;
  }
  .counter-input {
    width: 80px;
    padding: 6px 10px;
    border: 1.5px solid var(--mist);
    background: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--moss-deep);
    border-radius: 5px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .counter-input:focus {
    border-color: var(--clay);
  }

  /* TIER PROGRESS */
  .tier-progress-bar {
    display: flex;
    gap: 2px;
    margin: 8px 0 4px;
    height: 6px;
  }
  .tier-seg {
    flex: 1;
    background: var(--mist);
    transition: background 0.3s;
  }
  .tier-seg.active { background: var(--leaf); }
  .tier-seg.complete { background: var(--moss-deep); }

  /* WARNING */
  .warn {
    font-size: 12px;
    color: #B8503A;
    background: #FFF4E6;
    padding: 10px 12px;
    margin-top: 10px;
    border-radius: 5px;
    line-height: 1.5;
    font-weight: 500;
  }

  /* FOOTER */
  footer {
    margin-top: 60px;
    padding-top: 28px;
    border-top: 1px solid var(--mist);
    text-align: center;
  }
  footer .brand-line {
    display: inline-flex;
    align-items: baseline;
    gap: 14px;
    color: var(--moss-deep);
  }
  footer .elandia {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.30em;
    color: var(--clay);
  }
  footer .cn {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--moss-deep);
    position: relative;
    padding-left: 14px;
  }
  footer .cn::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 12px;
    background: var(--mist);
  }

  /* SYNC INDICATOR */
  .sync {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--moss);
    color: #fff;
    padding: 8px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
    border-radius: 20px;
    box-shadow: 0 4px 12px rgba(61, 153, 112, 0.3);
  }
  .sync.show { opacity: 1; }

  /* HERO STAT */
  .hero-stat {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-bottom: 24px;
  }
  .hero-stat > div {
    background: #fff;
    flex: 1;
    padding: 18px 14px;
    text-align: center;
    border-radius: 6px;
    border: 1px solid var(--mist);
    box-shadow: 0 1px 3px var(--shadow);
  }
  .hero-stat .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 600;
    color: var(--moss-deep);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .hero-stat .stat-label {
    font-family: 'Manrope', 'Noto Sans TC', sans-serif;
    font-size: 10px;
    color: var(--soft);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 8px;
    font-weight: 600;
  }

  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    h1 .accent { font-size: 24px; }
    .task-name { font-size: 14px; }
    .category-head .title { font-size: 17px; }
    .hero-stat .stat-num { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand-mark">Bonus Tasks · 12 Weeks</div>
    <h1>加分任務 <span class="accent">tracker</span></h1>
    <div class="meta">蘭境挑戰 · 團隊共享追蹤 · 5/11 – 8/2</div>
  </header>

  <div class="user-bar">
    <div>
      <label>挑戰者</label><br>
      <select id="userSelect">
        <option value="">-- 選擇身分 --</option>
        <option value="phoebe">Phoebe</option>

// Compute total possible points

CATEGORIES.forEach(cat => cat.tasks.forEach(t => {
  if (t.type === 'checklist') t.items.forEach(i => MAX_POINTS += i.points);
  if (t.type === 'tier') t.tiers.forEach(ti => MAX_POINTS += ti.points);
  if (t.type === 'count_tier' || t.type === 'counter_tier') {
    const max = Math.max(...t.tiers.map(ti => ti.points));
    MAX_POINTS += max;
  }
}));

// ============ SUPABASE CONFIG ============
const SUPABASE_URL = 'https://oghjuynrdmrmaudbdiox.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6D1JketgZNisyIw_R7XByQ_QLj3puj7';
const TABLE_URL = `${SUPABASE_URL}/rest/v1/tracker`;
const SB_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// Debounce save to avoid hammering the API
let savePending = false;
let saveTimer = null;

// ============ STORAGE ============
async function loadAll() {
  try {
    const res = await fetch(`${TABLE_URL}?id=eq.shared&select=data`, {
      headers: SB_HEADERS
    });
    if (!res.ok) throw new Error('Load failed: ' + res.status);
    const rows = await res.json();
    if (rows.length > 0 && rows[0].data) {
      allData = rows[0].data;
    } else {
      allData = {};
    }
  } catch (e) {
    console.error('Load error', e);
    showSync('離線', true);
    // Keep current allData if exists
    if (!allData || Object.keys(allData).length === 0) allData = {};
  }
  // Ensure all members have entries
  MEMBERS.forEach(m => {
    if (!allData[m.id]) allData[m.id] = {};
  });
}

async function saveAll() {
  // Debounce: schedule save 300ms after last change
  if (saveTimer) clearTimeout(saveTimer);
  savePending = true;
  saveTimer = setTimeout(async () => {
    try {
      const res = await fetch(`${TABLE_URL}?id=eq.shared`, {
        method: 'PATCH',
        headers: SB_HEADERS,
        body: JSON.stringify({ data: allData, updated_at: new Date().toISOString() })
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error('Save failed: ' + res.status + ' ' + errText);
      }
      savePending = false;
      showSync();
    } catch (e) {
      console.error('Save error', e);
      showSync('儲存失敗', true);
    }
  }, 300);
}

let syncTimer;
function showSync(msg, isError) {
  const el = document.getElementById('sync');
  el.textContent = msg || '✓ 已同步';
  el.style.background = isError ? '#b8654a' : '';
  el.classList.add('show');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => el.classList.remove('show'), isError ? 3000 : 1500);
}

// ============ SCORE ============
function computeScore(userId) {
  const data = allData[userId] || {};
  let score = 0;

  CATEGORIES.forEach(cat => {
    cat.tasks.forEach(t => {
      if (t.type === 'checklist') {
        t.items.forEach(i => {
          if (data['c_' + i.id]) score += i.points;
        });
      } else if (t.type === 'tier') {
        t.tiers.forEach(ti => {
          if (data['c_' + ti.id]) score += ti.points;
        });
      } else if (t.type === 'count_tier') {
        const count = data['n_' + t.id] || 0;
        const extra = data['n_' + t.id + '_extra'] || 0;
        let earned = 0;
        t.tiers.forEach(ti => {
          const okExtra = ti.extra ? extra >= ti.extra : true;
          if (count >= ti.threshold && okExtra) {
            earned = Math.max(earned, ti.points);
          }
        });
        score += earned;
      } else if (t.type === 'counter_tier') {
        const count = data['n_' + t.id] || 0;
        let earned = 0;
        t.tiers.forEach(ti => {
          if (count >= ti.threshold) earned = Math.max(earned, ti.points);
        });
        score += earned;
      } else if (t.type === 'counter_only') {
        // No fixed scoring; ignore for now
      } else if (t.type === 'sleep_tier') {
        // Earn points if ANY one group has all items checked
        const anyGroupComplete = t.groups.some(g =>
          g.items.every(i => data['c_' + i.id])
        );
        if (anyGroupComplete) score += t.points;
      }
    });
  });

  return score;
}

function countCompleted(userId) {
  const data = allData[userId] || {};
  let n = 0;
  CATEGORIES.forEach(cat => cat.tasks.forEach(t => {
    if (t.type === 'checklist') t.items.forEach(i => { if (data['c_' + i.id]) n++; });
    if (t.type === 'tier') t.tiers.forEach(ti => { if (data['c_' + ti.id]) n++; });
    if (t.type === 'count_tier' || t.type === 'counter_tier') {
      const count = data['n_' + t.id] || 0;
      const extra = data['n_' + t.id + '_extra'] || 0;
      t.tiers.forEach(ti => {
        const okExtra = ti.extra ? extra >= ti.extra : true;
        if (count >= ti.threshold && okExtra) n++;
      });
    }
    if (t.type === 'sleep_tier') {
      // count each checked sub-item as one completed step
      t.groups.forEach(g => g.items.forEach(i => { if (data['c_' + i.id]) n++; }));
    }
  }));
  return n;
}

// ============ RENDER ============
function renderTeamBoard() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  let total = 0;
  MEMBERS.forEach(m => {
    const score = computeScore(m.id);
    total += score;
    const cell = document.createElement('div');
    cell.className = 'team-cell' + (m.id === currentUser ? ' self' : '');
    cell.innerHTML = `
      <div class="name">${m.name}</div>
      <div class="score">${score}</div>
      <div class="score-label">pts</div>
    `;
    grid.appendChild(cell);
  });
  document.getElementById('teamTotal').textContent = total;
}

  }
  const now = new Date();
  const diff = Math.ceil((END_DATE - now) / (1000 * 60 * 60 * 24));
  document.getElementById('daysLeft').textContent = diff > 0 ? diff : '0';
}

function renderMyScore() {
  if (currentUser) {
    document.getElementById('myScore').textContent = computeScore(currentUser);
  } else {
    document.getElementById('myScore').textContent = '–';
  }
}

function renderTasks() {
  const container = document.getElementById('tasksContainer');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category';
    section.innerHTML = `
      <div class="category-head">
        <span class="num">${cat.num}</span>
        <span class="title">${cat.name}</span>
        <span class="en">${cat.en}</span>
      </div>
    `;
    cat.tasks.forEach(t => {
      section.appendChild(renderTask(t));
    });
    container.appendChild(section);
  });
}

function renderTask(t) {
  const data = currentUser ? allData[currentUser] : {};
  const card = document.createElement('div');
  card.className = 'task';
  card.dataset.taskId = t.id;

  // Compute progress display
  let progress = '';
  if (t.type === 'checklist') {
    const done = t.items.filter(i => data['c_' + i.id]).length;
    progress = `${done}<small>/${t.items.length}</small>`;
  } else if (t.type === 'tier') {
    const done = t.tiers.filter(ti => data['c_' + ti.id]).length;
    progress = `${done}<small>/${t.tiers.length}</small>`;
  } else if (t.type === 'count_tier' || t.type === 'counter_tier') {
    const n = data['n_' + t.id] || 0;
    progress = `${n}<small>/${t.counter.max}</small>`;
  } else if (t.type === 'counter_only') {
    const n = data['n_' + t.id] || 0;
    progress = `${n}<small>家</small>`;
  } else if (t.type === 'sleep_tier') {
    const anyDone = t.groups.some(g => g.items.every(i => data['c_' + i.id]));
    const maxDone = Math.max(...t.groups.map(g => g.items.filter(i => data['c_' + i.id]).length));
    progress = anyDone ? `✓<small>達標</small>` : `${maxDone}<small>/3</small>`;
  }

  // Build body
  let body = `<div class="task-desc">${t.desc}</div>`;
  if (t.warn) body += `<div class="warn">⚠ ${t.warn}</div>`;

  if (t.type === 'checklist') {
    body += '<div class="checklist">';
    t.items.forEach(i => {
      const done = data['c_' + i.id] ? 'done' : '';
      body += `
        <div class="check-row ${done}" data-toggle="c_${i.id}">
          <div class="check-box"></div>
          <div class="check-label">${i.label}${i.sub ? `<span class="sub">${i.sub}</span>` : ''}${i.linkInline ? `<br><a href="${i.linkInline}" target="_blank" class="task-link" onclick="event.stopPropagation()">→ 表單連結</a>` : ''}</div>
          ${i.points > 0 ? `<div class="check-points">+${i.points}</div>` : ''}
        </div>
      `;
    });
    body += '</div>';
  } else if (t.type === 'tier') {
    body += '<div class="tier-list">';
    t.tiers.forEach(ti => {
      const done = data['c_' + ti.id] ? 'done' : '';
      body += `
        <div class="tier-row ${done}" data-toggle="c_${ti.id}">
          <div class="check-box"></div>
          <div class="tier-name">${ti.name}</div>
          <div class="tier-desc">${ti.desc}</div>
          <div class="check-points">+${ti.points}</div>
        </div>
      `;
    });
    body += '</div>';
  } else if (t.type === 'count_tier') {
    const n = data['n_' + t.id] || 0;
    const extra = data['n_' + t.id + '_extra'] || 0;
    body += `<div class="counter-block">`;
    body += `
      <div class="counter-row">
        <div class="counter-label">${t.counter.label}</div>
        <div class="counter-controls">
          <button class="counter-btn" data-counter="${t.id}" data-delta="-1">−</button>
          <div class="counter-value">${n}</div>
          <button class="counter-btn" data-counter="${t.id}" data-delta="1">+</button>
        </div>
      </div>
    `;
    if (t.counterExtra) {
      body += `
        <div class="counter-row">
          <div class="counter-label">${t.counterExtra.label}</div>
          <div class="counter-controls">
            <input type="number" class="counter-input" data-counter-input="${t.id}_extra" value="${extra}" min="0" step="0.1">
          </div>
        </div>
      `;
    }
    body += `</div>`;

    // Tier list (read-only, auto-computed)
    body += '<div class="tier-list">';
    t.tiers.forEach(ti => {
      const okExtra = ti.extra ? extra >= ti.extra : true;
      const reached = n >= ti.threshold && okExtra;
      const done = reached ? 'done' : '';
      let descText;
      if (ti.descText) {
        descText = ti.descText;
      } else {
        descText = `達 ${ti.threshold} 項`;
      }
      body += `
        <div class="tier-row ${done}" style="cursor:default">
          <div class="check-box"></div>
          <div class="tier-name">${ti.name}</div>
          <div class="tier-desc">${descText}</div>
          <div class="check-points">+${ti.points}</div>
        </div>
      `;
    });
    body += '</div>';
  } else if (t.type === 'counter_tier') {
    const n = data['n_' + t.id] || 0;
    body += `<div class="counter-block">`;
    body += `
      <div class="counter-row">
        <div class="counter-label">${t.counter.label}</div>
        <div class="counter-controls">
          <input type="number" class="counter-input" data-counter-input="${t.id}" value="${n}" min="0" step="10">
        </div>
      </div>
    `;
    body += `</div>`;

    body += '<div class="tier-list">';
    t.tiers.forEach(ti => {
      const reached = n >= ti.threshold;
      const done = reached ? 'done' : '';
      body += `
        <div class="tier-row ${done}" style="cursor:default">
          <div class="check-box"></div>
          <div class="tier-name">${ti.name}</div>
          <div class="tier-desc">達 ${ti.threshold} 分鐘（${ti.desc}）</div>
          <div class="check-points">+${ti.points}</div>
        </div>
      `;
    });
    body += '</div>';
  } else if (t.type === 'counter_only') {
    const n = data['n_' + t.id] || 0;
    body += `<div class="counter-block">`;
    body += `
      <div class="counter-row">
        <div class="counter-label">${t.counter.label}</div>
        <div class="counter-controls">
          <button class="counter-btn" data-counter="${t.id}" data-delta="-1">−</button>
          <div class="counter-value">${n}</div>
          <button class="counter-btn" data-counter="${t.id}" data-delta="1">+</button>
        </div>
      </div>
    `;
    body += `</div>`;
    body += `<div class="warn" style="color: var(--soft); background: var(--bone-warm);">此項目計分規則未明確標示，僅作數量記錄</div>`;
  } else if (t.type === 'sleep_tier') {
    // Render two groups; either group fully checked = points awarded
    const completeGroups = t.groups.filter(g => g.items.every(i => data['c_' + i.id]));
    const earnedHint = completeGroups.length > 0
      ? `<div class="warn" style="color: var(--moss-deep); background: rgba(61, 153, 112, 0.10); font-weight: 600;">✓ 已達標（${completeGroups.map(g => g.name).join('、')} 三區間全完成），獲得 ${t.points} 分</div>`
      : '';
    body += earnedHint;

    t.groups.forEach(g => {
      const groupDone = g.items.every(i => data['c_' + i.id]);
      body += `<div style="margin-top: 14px; padding: 14px 16px; background: ${groupDone ? 'rgba(61, 153, 112, 0.08)' : 'var(--bone-warm)'}; border-radius: 6px; border: 1px solid ${groupDone ? 'rgba(61, 153, 112, 0.25)' : 'transparent'};">`;
      body += `<div style="font-family: 'Manrope', 'Noto Sans TC', sans-serif; font-weight: 700; color: var(--moss-deep); margin-bottom: 8px; font-size: 13px; letter-spacing: 0.02em;">${g.name}<span style="font-size: 11px; color: var(--soft); font-weight: 500; margin-left: 8px;">三區間全勾才達標 +${t.points} 分</span></div>`;
      body += '<div class="checklist">';
      g.items.forEach(i => {
        const done = data['c_' + i.id] ? 'done' : '';
        body += `
          <div class="check-row ${done}" data-toggle="c_${i.id}">
            <div class="check-box"></div>
            <div class="check-label">${i.label}</div>
          </div>
        `;
      });
      body += '</div></div>';
    });

    // Form report row
    if (t.formItem) {
      const done = data['c_' + t.formItem.id] ? 'done' : '';
      body += `
        <div style="margin-top: 12px;">
          <div class="check-row ${done}" data-toggle="c_${t.formItem.id}" style="padding: 12px 14px; background: #FFF4E6; border-radius: 6px;">
            <div class="check-box"></div>
            <div class="check-label">${t.formItem.label}</div>
          </div>
        </div>
      `;
    }
  }

  if (t.link) {
    body += `<a href="${t.link}" target="_blank" class="task-link">→ 開啟成果上傳表單</a>`;
  }

  card.innerHTML = `
    <div class="task-head">
      <div class="task-name">${t.name}</div>
      <div class="task-progress">${progress}</div>
      <div class="toggle-icon" role="button" aria-label="收合或展開">＋</div>
    </div>
    <div class="task-body"><div class="task-inner">${body}</div></div>
  `;

  // Click task head: only EXPAND (never collapse via clicking the body area)
  card.querySelector('.task-head').addEventListener('click', (e) => {
    // If user clicked the toggle icon, let its handler decide
    if (e.target.closest('.toggle-icon')) return;
    // Otherwise: only allow expanding; never collapse from clicking elsewhere
    if (!card.classList.contains('open')) {
      card.classList.add('open');
    }
  });

  // The toggle icon is the ONLY thing that can collapse
  card.querySelector('.toggle-icon').addEventListener('click', (e) => {
    e.stopPropagation();
    card.classList.toggle('open');
  });

  // Toggle checks
  card.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!currentUser) {
        alert('請先在上方選擇你的身分');
        return;
      }
      const key = el.dataset.toggle;
      allData[currentUser][key] = !allData[currentUser][key];
      el.classList.toggle('done');
      await saveAll();
      renderMyScore();
      renderTeamBoard();
      renderHeroStats();
      if (t.type === 'sleep_tier') {
        reRenderTask(t.id);
      } else {
        updateTaskProgress(t.id);
      }
    });
  });

  // Counter buttons
  card.querySelectorAll('[data-counter]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!currentUser) {
        alert('請先選擇身分');
        return;
      }
      const tid = btn.dataset.counter;
      const delta = parseInt(btn.dataset.delta);
      const key = 'n_' + tid;
      const cur = allData[currentUser][key] || 0;
      const newVal = Math.max(0, cur + delta);
      allData[currentUser][key] = newVal;
      await saveAll();
      renderMyScore();
      renderTeamBoard();
      renderHeroStats();
      // Re-render this task to update tiers
      reRenderTask(t.id);
    });
  });

  // Counter inputs
  card.querySelectorAll('[data-counter-input]').forEach(input => {
    input.addEventListener('change', async (e) => {
      e.stopPropagation();
      if (!currentUser) {
        alert('請先選擇身分');
        input.value = 0;
        return;
      }
      const tid = input.dataset.counterInput;
      const val = parseFloat(input.value) || 0;
      allData[currentUser]['n_' + tid] = val;
      await saveAll();
      renderMyScore();
      renderTeamBoard();
      renderHeroStats();
      reRenderTask(t.id);
    });
    input.addEventListener('click', e => e.stopPropagation());
  });

  return card;
}

function updateTaskProgress(taskId) {
  // For checklist tasks, just update progress text
  const card = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!card) return;
  const t = findTask(taskId);
  if (!t) return;
  const data = allData[currentUser] || {};
  let progress = '';
  if (t.type === 'checklist') {
    const done = t.items.filter(i => data['c_' + i.id]).length;
    progress = `${done}<small>/${t.items.length}</small>`;
  } else if (t.type === 'tier') {
    const done = t.tiers.filter(ti => data['c_' + ti.id]).length;
    progress = `${done}<small>/${t.tiers.length}</small>`;
  }
  if (progress) card.querySelector('.task-progress').innerHTML = progress;
}

function reRenderTask(taskId) {
  const t = findTask(taskId);
  if (!t) return;
  const card = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  const newCard = renderTask(t);
  if (wasOpen) newCard.classList.add('open');
  card.replaceWith(newCard);
}

function findTask(id) {
  for (const cat of CATEGORIES) {
    for (const t of cat.tasks) {
      if (t.id === id) return t;
    }
  }
  return null;
}

// ============ INIT ============
async function init() {
  await loadAll();

  // Restore last user from URL hash or localStorage-equivalent
  const hash = window.location.hash.replace('#', '');
  if (hash && MEMBERS.find(m => m.id === hash)) {
    currentUser = hash;
    document.getElementById('userSelect').value = hash;
  }

  document.getElementById('userSelect').addEventListener('change', (e) => {
    currentUser = e.target.value;
    window.location.hash = currentUser;
    renderTasks();
    renderTeamBoard();
    renderMyScore();
    renderHeroStats();
  });

  renderTasks();
  renderTeamBoard();
  renderMyScore();
  renderHeroStats();

  // Auto-refresh team board every 15s to pick up changes from other members
  setInterval(async () => {
    if (savePending) return; // Don't overwrite local changes that haven't saved yet
    await loadAll();
    renderTeamBoard();
    renderMyScore();
    renderHeroStats();
    // Re-render tasks panel so any updates from others show through
    renderTasks();
  }, 15000);
}

init();
</script>
</body>
</html>
